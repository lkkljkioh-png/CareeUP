<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareeUP 회원가입</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/login-signin.css">

</head>
<body>

<div class="signup-container">

    <div class="left-panel">
        <img src="../images/careeup_logo.png" alt="logo">

        <h1>Join<br>CareeUP</h1>

        <p>
            선배와 후배를 연결하는<br>
            커리어 네트워크에 가입하고<br>
            다양한 정보를 공유해보세요.
        </p>

    </div>

    <div class="right-panel">

        <h2>회원가입</h2>
        <p>아래 정보를 입력하여 CareeUP을 시작하세요.</p>

        <form onsubmit="return checkForm()">

            <div class="form-row">
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="name" placeholder="이름">
                </div>
            </div>

            <div class="form-group">
                <label>이메일</label>
                <input type="email" id="email" placeholder="example@careeup.com">
            </div>

            <div class="form-group">
                <label>아이디</label>
                <input type="text" id="user-id" placeholder="아이디 입력">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호">
                </div>

                <div class="form-group">
                    <label>비밀번호 확인</label>
                    <input type="password" id="password-check" placeholder="비밀번호 확인">
                </div>
            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>회원 유형</label>

                    <select id="membership-type">
                        <option>선택하세요</option>
                        <option>재학생</option>
                        <option>졸업생</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>성별</label>

                    <div class="radio-group">
                        <label>
                            <input type="radio" name="gender" id="male">
                            남
                        </label>

                        <label>
                            <input type="radio" name="gender" id="female">
                            여
                        </label>
                    </div>

                </div>

            </div>

            <button class="signup-btn" type="submit">
                회원가입
            </button>

        </form>

        <div class="login-link">
            이미 회원이신가요?
            <a href="../html/login.html">로그인</a>
        </div>

    </div>

</div>

<!-- js랑 연결 -->
<script src="../javascript/signin.js"></script>

</body>
</html>
