<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareeUP 회원가입</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'SUIT',sans-serif;
    background:#f5f5f3;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.signup-container{
    width:100%;
    max-width:1200px;
    display:flex;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.left-panel{
    width:40%;
    background:#185FA5;
    color:#fff;
    padding:70px 50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left-panel img{
    width:70px;
    margin-bottom:25px;
}

.left-panel h1{
    font-size:48px;
    margin-bottom:20px;
    line-height:1.2;
}

.left-panel p{
    font-size:17px;
    line-height:1.8;
    opacity:.9;
}

.right-panel{
    flex:1;
    padding:60px;
}

.right-panel h2{
    font-size:34px;
    margin-bottom:8px;
    color:#111;
}

.right-panel p{
    color:#888;
    margin-bottom:35px;
}

.form-row{
    display:flex;
    gap:20px;
}

.form-group{
    flex:1;
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#444;
    font-weight:500;
}

.form-group input,
.form-group select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:.2s;
}

.form-group input:focus,
.form-group select:focus{
    outline:none;
    border-color:#185FA5;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:10px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:15px;
    cursor:pointer;
}

.signup-btn{
    width:100%;
    margin-top:20px;
    padding:16px;
    border:none;
    background:#185FA5;
    color:white;
    font-size:17px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

.signup-btn:hover{
    background:#144d86;
}

.login-link{
    text-align:center;
    margin-top:25px;
}

.login-link a{
    text-decoration:none;
    color:#185FA5;
    font-weight:500;
}
</style>

</head>
<body>

<div class="signup-container">

    <div class="left-panel">
        <img src="../images/careeup_logo.png" alt="logo">

        <h1>Join<br>CareeUP</h1>

        <p>
            선배와 후배를 연결하는<br>
            커리어 네트워크에 가입하고<br>
            다양한 정보를 공유해보세요.
        </p>

    </div>

    <div class="right-panel">

        <h2>회원가입</h2>
        <p>아래 정보를 입력하여 CareeUP을 시작하세요.</p>

        <form onsubmit="return checkForm()">

            <div class="form-row">
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="name" placeholder="이름">
                </div>
            </div>

            <div class="form-group">
                <label>이메일</label>
                <input type="email" id="email" placeholder="example@careeup.com">
            </div>

            <div class="form-group">
                <label>아이디</label>
                <input type="text" id="userId" placeholder="아이디 입력">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호">
                </div>

                <div class="form-group">
                    <label>비밀번호 확인</label>
                    <input type="password" id="passwordCheck" placeholder="비밀번호 확인">
                </div>
            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>회원 유형</label>

                    <select id="membershipType">
                        <option>선택하세요</option>
                        <option>재학생</option>
                        <option>졸업생</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>성별</label>

                    <div class="radio-group">
                        <label>
                            <input type="radio" name="gender" id="male">
                            남
                        </label>

                        <label>
                            <input type="radio" name="gender" id="female">
                            여
                        </label>
                    </div>

                </div>

            </div>

            <button class="signup-btn" type="submit">
                회원가입
            </button>

        </form>

        <div class="login-link">
            이미 회원이신가요?
            <a href="../html/login.html">로그인</a>
        </div>

    </div>

</div>

<!-- js랑 연결 -->
<script src="../javascript/signin.js"></script>

</body>
</html>
