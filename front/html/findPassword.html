<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareeUP | 비밀번호 찾기</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/findPassword.css">
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="../images/careeup_logo.png" alt="CareeUP 로고">
            <h1>CareeUP</h1>
        </div>

        <div class="card">

            <h2>비밀번호 찾기</h2>
            <p class="description">
                가입한 아이디와 이메일을 입력해주세요.<br>
            </p>

            <form id="find-password-form" onsubmit="return findPassword()">

                <div class="input-group">
                    <label for="userId">아이디</label>
                    <input type="text"
                           id="user-id"
                           name="userId"
                           placeholder="아이디를 입력하세요">
                </div>

                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="example@email.com">
                </div>

                <button type="submit" id="find-password-btn" class="find-btn">
                    비밀번호 찾기
                </button>

            </form>

            <div class="bottom-links">
                <a href="login.html">로그인</a>
                <span>|</span>
                <a href="signin.html">회원가입</a>
            </div>

        </div>

    </div>

</body>

</html>
