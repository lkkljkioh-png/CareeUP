<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareeUP | MY</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/graduateMy.css">

</head>

<body>

    <header>

        <div class="logo">
            <img src="../images/careeup_logo.png" alt="로고">
            <span>CareeUP</span>
        </div>

        <nav>
            <ul>
                <li><a href="main.html">MAIN</a></li>
                <li><a href="profileList.html">SEARCH</a></li>
                <li><a href="qa.html">Q&A</a></li>
                <li><a href="#" class="active">PROFILE</a></li>
                <li><a href="my.html">MY</a></li>
                <li><a href="login.html">LOGIN</a></li>
        </nav>

    </header>

    <div class="container">

        <div class="right-section">

            <!-- 프로필 -->
            <div class="profile-card">

                <div class="profile-top">

                    <div class="profile-img">
                        <i class="ti ti-user"></i>
                    </div>

                    <div class="profile-info">
                        <h3 id="name">김유민</h3>
                        <p id="company">AWS</p>
                        <span id="position">소프트웨어 엔지니어</span>
                    </div>

                </div>

            </div>

            <!-- 나의 활동 -->
            <div class="menu-card">

                <h4>나의 활동</h4>

                <div class="menu">
                    <div class="menu-left">
                        <i class="ti ti-certificate"></i>
                        <span>보유 자격증</span>
                    </div>
                    <div class="count" id="owned-cert">4</div>
                </div>

                <div class="menu">
                    <div class="menu-left">
                        <i class="ti ti-world"></i>
                        <span>대외 활동</span>
                    </div>
                    <div class="count" id="external-activities">2</div>
                </div>

                <div class="menu">
                    <div class="menu-left">
                        <i class="ti ti-briefcase"></i>
                        <span>경력</span>
                    </div>
                    <div class="count" id="experience">5</div>
                </div>

                <button class="btn" onclick="location.href='graduateProfile.html'">
                    프로필 완성하러 가기
                </button>

            </div>

        </div>

    </div>

</body>

</html>
