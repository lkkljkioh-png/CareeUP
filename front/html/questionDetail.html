<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareeUP | 질문 상세</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/questionDetail.css">
</head>

<body>

<header>

    <div class="logo">
        <img src="../images/careeup_logo.png" alt="로고">
        <span>CareeUP</span>
    </div>

    <nav>
        <ul>
            <li><a href="main.html">MAIN</a></li>
            <li><a href="profileList.html">SEARCH</a></li>
            <li><a href="qa.html" class="active">Q&A</a></li>
            <li><a onclick="goProfile()">PROFILE</a></li>
            <li><a onclick="goMyPage()">MY</a></li>
            <li><a href="login.html">LOGIN</a></li>
        </ul>
    </nav>

</header>

<div class="container">

    <!-- 질문 -->
    <div class="question-card">

        <div class="question-top">

            <!-- DB에서 category 값 출력 -->
            <span class="category" id="question-category">
                진로/취업
            </span>

            <!-- DB에서 date 값 출력 -->
            <span class="date" id="question-date">
                <i class="ti ti-calendar"></i>
                2026-06-30
            </span>

        </div>

        <!-- DB에서 title 출력 -->
        <h2 id="question-title">
            질문 제목
        </h2>

        <!-- DB에서 writer 출력 -->
        <div class="writer" id="question-writer">
            <i class="ti ti-user"></i>
            작성자
        </div>

        <!-- DB에서 content 출력 -->
        <div class="content" id="question-content">
            질문 내용
        </div>

    </div>

    <div class="button-area">
        <button class="answer-btn" id="answer-btn" onclick="window.location.href='answer.html'">
            <i class="ti ti-message-circle"></i>
            답변하기
        </button>
    </div>

    <!-- 답변 목록 -->
    <div class="answer-section">

        <h3>답변</h3>

        <!-- JS가 답변 카드를 생성하는 영역 -->
        <div id="answer-list">

            <div class="answer-card">

                <div class="answer-info">
                    <span class="answer-writer">
                        <i class="ti ti-user"></i>
                        홍길동
                    </span>

                    <span class="answer-date">
                        2026-07-02
                    </span>
                </div>

                <p class="answer-content">
                    답변 내용
                </p>

            </div>

        </div>

    </div>

</div>

<script src="../javascript/common.js"></script>
<script src="../javascript/questionDetail.js"></script>

</body>

</html>
