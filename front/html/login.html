<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareeUP Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f5f5f3;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:100%;
    max-width:1100px;
    display:flex;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.left-panel{
    flex:1;
    background:#185FA5;
    color:white;
    padding:80px 60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left-panel h1{
    font-size:56px;
    margin-bottom:20px;
}

.left-panel p{
    font-size:18px;
    line-height:1.8;
    opacity:0.9;
}

.right-panel{
    flex:1;
    padding:80px 60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo img{
    width:60px;
    margin-bottom:10px;
}

.logo h2{
    color:#185FA5;
    font-size:32px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#555;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.input-group input:focus{
    outline:none;
    border-color:#185FA5;
}

.login-btn{
    width:100%;
    padding:15px;
    background:#185FA5;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.login-btn:hover{
    background:#144d86;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#888;
    font-size:14px;
    margin:0 10px;
}

.links a:hover{
    color:#185FA5;
}
</style>
</head>

<body>

<div class="login-container">

    <div class="left-panel">
        <h1>Welcome</h1>
        <p>
            CareeUP에 로그인하고<br>
            선배와 후배를 연결하는<br>
            커리어 네트워크를 시작하세요.
        </p>
    </div>

    <div class="right-panel">

        <div class="logo">
            <img src="../images/careeup_logo.png" alt="로고">
            <h2>CareeUP</h2>
        </div>

        <form onsubmit="return checkLogin()">
            <div class="input-group">
                <label>아이디</label>
                <input type="text" id="userId" placeholder="아이디를 입력하세요">
            </div>

            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요">
            </div>

            <button class="login-btn" type="submit">로그인</button>
        </form>

        <div class="links">
            <a href="../html/signin.html">회원가입</a>
            <a href="#">비밀번호 찾기</a>
        </div>

    </div>

</div>

<!-- js랑 연결 -->
<script src="../javascript/login.js"></script>

</body>
</html>
