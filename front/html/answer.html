<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareeUP | 답변 작성</title>

    <link rel="stylesheet" href="answer.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/answer.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="../images/careeup_logo.png" alt="로고">
            <h2>CareeUP</h2>
        </div>

        <nav>
            <ul>
                <li><a href="main.html">MAIN</a></li>
                <li><a href="profileList.html">SEARCH</a></li>
                <li><a href="qa.html" class="active">Q&A</a></li>
                <li><a onclick="goProfile()">PROFILE</a></li>
                <li><a onclick="goMyPage()">MY</a></li>
                <li><a href="login.html">LOGIN</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <div class="question-card">

            <div class="question-header">
                <span class="badge">질문</span>
                <span class="date" id="question-date">2026.06.30</span>
            </div>

            <h2 id="question-title">백엔드 개발자가 되려면 어떤 공부부터 시작해야 하나요?</h2>
            
            <p class="writer" id="question-writer">
                윤효서
            </p>

            <p class="question-content" id="question-content">
                현재 Java와 HTML/CSS를 공부하고 있습니다.
                취업을 목표로 하고 있는데 어떤 순서로 공부하면 좋을지
                현업 경험을 바탕으로 조언 부탁드립니다.
            </p>

        </div>

        <div class="answer-card">

            <h3>답변 작성</h3>

            <textarea placeholder="답변을 입력해주세요." id="answer-content"></textarea>

            <div class="button-area">
                <button class="submit" onclick="submitAnswer()">답변 등록</button>
            </div>

        </div>

    </main>

    <!-- JavaScript 파일 연결 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../javascript/answer.js"></script>
    <script src="../javascript/common.js"></script>
    
</body>

</html>
