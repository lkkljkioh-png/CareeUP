<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareeUP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 80px;
      background: #fff;
      border-bottom: 1px solid #e8e8e6;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #111;
    }

    .logo img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    nav ul { display: flex; list-style: none; gap: 48px; }
    nav a {
      text-decoration: none;
      color: #888;
      font-size: 15px;
      letter-spacing: 0.4px;
      transition: color 0.2s;
    }
    nav a:hover { color: #185FA5; }
    nav a.active { color: #111; font-weight: 500; }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 80px;
      gap: 100px;
      max-width: 1300px;
      margin: 0 auto;
      width: 100%;
    }

    .left-section { flex: 1; }

    .tag {
      display: inline-block;
      background: #E6F1FB;
      color: #185FA5;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.8px;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
    }

    .left-section h2 {
      font-size: 90px;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -2px;
      color: #111;
      margin-bottom: 20px;
    }

    .left-section h2 span { color: #185FA5; }

    .left-section p {
      font-size: 18px;
      color: #888;
      line-height: 1.8;
    }

    .right-section {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 500px;
      flex-shrink: 0;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e6;
      border-radius: 16px;
      padding: 28px 30px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
    }

    .card:hover {
      border-color: #185FA5;
      transform: translateY(-3px);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }

    .card.grad .card-icon { background: #E6F1FB; color: #185FA5; }
    .card.stu .card-icon { background: #EAF3DE; color: #3B6D11; }

    .card h3 {
      font-size: 18px;
      font-weight: 500;
      color: #111;
      margin-bottom: 6px;
    }

    .card p { font-size: 14px; color: #aaa; }

    .card-arrow {
      position: absolute;
      top: 26px;
      right: 26px;
      font-size: 22px;
      color: #ccc;
      transition: color 0.2s;
    }

    .card:hover .card-arrow { color: #185FA5; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="images/careeup_logo.png" alt="CareeUP 로고">
    <span>CareeUP</span>
  </div>
  <nav>
    <ul>
      <li><a href="#" class="active">MAIN</a></li>
      <li><a href="#">PROFILE</a></li>
      <li><a href="#">Q&A</a></li>
      <li><a href="#">MY</a></li>
      <li><a href="#">LOGIN</a></li>
    </ul>
  </nav>
</header>

<div class="container">

  <div class="left-section">
    <span class="tag">CAREER NETWORK</span>
    <h2>Connect<br>your <span>career</span><br>journey.</h2>
    <p>선배와 후배를 잇는 커리어 네트워크.<br>경험을 나누고, 함께 성장하세요.</p>
  </div>

  <div class="right-section">
    <div class="card grad">
      <i class="ti ti-arrow-up-right card-arrow"></i>
      <div class="card-icon"><i class="ti ti-award"></i></div>
      <h3>졸업생으로 시작하기</h3>
      <p>나의 경험으로 후배를 이끌어주세요</p>
    </div>
    <div class="card stu">
      <i class="ti ti-arrow-up-right card-arrow"></i>
      <div class="card-icon"><i class="ti ti-school"></i></div>
      <h3>재학생으로 시작하기</h3>
      <p>선배들의 커리어 인사이트를 만나보세요</p>
    </div>
  </div>

</div>

</body>
</html>
